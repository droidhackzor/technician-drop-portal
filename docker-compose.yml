version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cable_drop_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cable_drop_portal?schema=public
      JWT_SECRET: replace-this-in-production
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  postgres_data:
